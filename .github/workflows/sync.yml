name: Sync publications from Google Scholar

# Scrapes the Scholar profile and commits publications.json.
# Runs weekly and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 7 * * 1"   # Mondays, 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scholar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Update publications.json
        run: python sync_scholar.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain publications.json)" ]]; then
            git config user.name  "scholar-sync-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add publications.json
            git commit -m "chore: sync publications from Google Scholar"
            git push
          else
            echo "No changes."
          fi
